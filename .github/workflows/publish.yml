name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (example: 0.1.2)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Workaround npm optional dependency bug (Rollup native binary)
        run: |
          ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
          npm install --no-save @rollup/rollup-linux-x64-gnu@"$ROLLUP_VERSION"
          node -e "require('@rollup/rollup-linux-x64-gnu')"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Validate version input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: $VERSION"
            exit 1
          fi

      - name: Bump package version
        working-directory: packages/ui
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Build package
        working-directory: packages/ui
        run: npm run build

      - name: Test package
        working-directory: packages/ui
        run: npm run test

      - name: Pack tarball
        working-directory: packages/ui
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-package-${{ github.event.inputs.version }}
          path: packages/ui/*.tgz

      - name: Publish to npm
        working-directory: packages/ui
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
